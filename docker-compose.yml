services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skill_graph}
      POSTGRES_USER: ${POSTGRES_USER:-skill_graph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skill_graph}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skill_graph} -d ${POSTGRES_DB:-skill_graph}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-skill_graph}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-skill_graph}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-skill_graph}
      CONTENT_ROOT: /app/content
    volumes:
      - ./content:/app/content:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: on-failure

  frontend:
    build: ./frontend
    environment:
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
